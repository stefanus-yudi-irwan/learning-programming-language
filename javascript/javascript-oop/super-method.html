<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Super Method</title>
    </head>
    <body>
        <script>
            
            class Shape {
                paint() {
                    console.info("Paint Shape")
                }
            };

            class Circle extends Shape {
                paint() {
                    super.paint(); // memanggil paint() method parent class
                    console.info("Paint Circle");
                }
            };

            const circle = new Circle();
            circle.paint();

        </script>
    </body>
</html>
