<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Class</title>
    </head>
    <body>
        <script>

            class Person {
                constructor(name) {
                    console.info(`Membuat person ${name}`);
                    this.name = name;
                    this.sayHello = function (name) {
                        console.info(`Hi ${name}, my name is ${this.name}`)
                    }
                }

                sayHelloProto (name) {
                    console.info(`Hi kawan ${name}, my name is ${this.name}`)
                }
            };

            const budi = new Person("Eko");
            const joko = new Person("Yudi");

            console.info(budi);
            console.info(budi.name);
            console.info(joko);
            console.info(joko.name);

            budi.sayHelloProto("Jujun");
            joko.sayHelloProto("Aming");

        </script>
    </body>
</html>
