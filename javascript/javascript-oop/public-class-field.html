<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Public Class Field</title>
    </head>
    <body>
        <script>
            
            class Customer {
                firstName;
                lastName;
                balance = 0;

                constructor(firstName, lastName) {
                    this.firstName = firstName;
                    this.lastName = lastName;
                }
            }

            const yudi = new Customer("Eko", "Kurniawan");
            console.info(yudi);

        </script>
    </body>
</html>
