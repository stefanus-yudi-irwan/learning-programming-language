<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Object</title>
    </head>
    <body>
        <script>

            // function constructor
            function Person(firstName, lastName){
                this.firstName = firstName
                this.lastName = lastName
                this.sayHello = function (name) {
                    console.info(`Hello ${name} my name is ${this.firstName}`)
                }
            }

            const yudi = new Person("Stefanus", "Yudi");
            yudi.sayHello("Joko");

            const budi = new Person("Budi", "Anduk");
            budi.sayHello("Joko");

            console.log(yudi);
            console.log(budi);
            
        </script>
    </body>
</html>
