<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Object</title>
    </head>
    <body>
        <script>
        {
            const person = {
                firstName: "Yudi",
                lastName: "Irwan"
            };

            Object.freeze(person);

            person.firstName = "Budi"; // tidak berubah
            delete person.firstName; // tidak berubah
            console.info(person);
        }

        {
            const person = {
                firstName: "Irwan",
                lastName: "Nugraha"
            };

            Object.seal(person);

            person.firstName = "Budi";
            person.middleName = "Kurniawan";
            delete person.firstName;
            console.info(person);
        } 
        
        {
            const target = {firstName: "Yudi"};
            const source = {firstName: "Budi", lastName: "Irwan"};

            Object.assign(target, source);
            console.info(target);
        }

        {
            const person = {
                firstName: "Yudi",
                lastName: "Irwan"
            }

            console.info(Object.values(person));
            console.info(Object.getOwnPropertyNames(person));
        }

        </script>
    </body>
</html>
