<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Anonymous Function</title>
    </head>
    <body>
        <script>
            let say = function (name) {
                console.info(`Hello ${name}`);
            }

            say("Eko");
            say("Budi");
            say("Yudi");

            function giveMeName(callback) {
                callback("Eko");
            }

            giveMeName(function (name) {
                console.info(`Hello ${name}`);
            });
        </script>
    </body>
</html>
