<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Arrow Function</title>
    </head>
    <body>
        <script>
            const sayHello = (name) => {
                const say = `Hello ${name}`;
                console.info(say);
            }

            sayHello("Eko")

            const sayHelloProgrammer = (name) => console.info(`Hello ${name}`);
            sayHelloProgrammer("Yudi");

            const sayHelloMe = name => console.info(`Hello ${name}`);
            sayHelloMe("Aing Maung");

            const sum = (first, second) => first + second;
            console.info(sum(10, 56));

            const sumNumber = (first, second) => {
                return first + second;
            }
            console.info(sum(68,349));

            function giveMeName(callback) {
                callback("Eko");
            }
            giveMeName(name => console.info(`Hello ${name}`));

        </script>
    </body>
</html>
