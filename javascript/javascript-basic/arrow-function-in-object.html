<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Arrow Function in Object</title>
    </head>
    <body>
        <script>
            const person = {
                name: "Yudi",
                sayHello: name => {
                    console.info(this); //Window
                    console.info(`Hello ${name}`)
                }
            };

            person.sayHello("Budi");
        </script>
    </body>
</html>
