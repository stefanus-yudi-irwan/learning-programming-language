<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>For In</title>
    </head>
    <body>
        <script>
            const names = ["Stefanus", "Yudi", "Irwan"];
            for (const name of names) {
                document.writeln(`<p>${name}</p>`);
            }

            const fullName = "Stefanus Yudi Irwan";
            for (const character of fullName) {
                document.writeln(`<p>${character}</p>`);
            }
        </script>
    </body>
</html>
