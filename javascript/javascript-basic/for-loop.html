<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>For Loop</title>
    </head>
    <body>
        <script>
            for (let counter =1 ;counter <= 20; counter++) {
                document.writeln(`<p>Perulangan ke-${counter}</p>`);
            }
        </script>
    </body>
</html>
