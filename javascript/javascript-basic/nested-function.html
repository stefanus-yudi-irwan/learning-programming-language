<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Nested Function</title>
    </head>
    <body>
        <script>
            function outer() {
                function inner() {
                    console.info("Inner");
                }

                inner();
                inner();
            }

            outer();
            inner(); //Error can not access innter function
        </script>
    </body>
</html>
