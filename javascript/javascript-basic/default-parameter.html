<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Default Parameter</title>
    </head>
    <body>
        <script>
            function register(name, gender = "UNKNOWN") {
                console.log(name);
                console.log(gender);
            }

            register("Eko", "MALE");
            register("Budi");
            register("Joko", undefined);
            register("Eko", null);
        </script>
    </body>
</html>
