<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Null</title>
    </head>
    <body>
        <script>
            let firstName = null;

            if (firstName === undefined) {
                alert("Hello Undefined");
            } else if (firstName === null) {
                alert("Hello Null");
            } else {
                alert(`Hello ${firstName}`);
            }
        </script>
    </body>
</html>
