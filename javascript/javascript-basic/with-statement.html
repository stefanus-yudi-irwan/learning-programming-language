<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>With Statement</title>
    </head>
    <body>
        <script>
            const person = {
                firstName: "Stefanus",
                middleName: "Yudi",
                lastName: "Irwan"
            };

            console.log(person.firstName);
            console.log(person.middleName);
            console.log(person.lastName);

            const firstName = "Dadang";
            const lastName = "Budi"

            with (person) {
                console.log(firstName);
                console.log(middleName);
                console.log(lastName);
            }

            console.log(firstName)
        </script>
    </body>
</html>
