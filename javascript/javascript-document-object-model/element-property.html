<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Element Property</title>
    </head>
    <body>
        <div id="content" class="content">
            <h1 id="title" class="title">This is Title</h1>
            <p id="description" clas="description">This is Description</p>
        </div>
        <script>

            const content = document.getElementById("content");
            console.info(content.id);
            console.info(content.className);
            console.info(content.tagName);

            const description = document.getElementById("description");
            const title = document.getElementById("title");

            description.remove();
            title.remove();

        </script>
    </body>
</html>
