<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Attribute</title>
    </head>
    <body>
        <img id="logo" alt="PZN Logo">
        <script>
            const logo = document.getElementById("logo");
            const src = document.createAttribute("src");
            src.value = "https://www.programmerzamannow.com/_app/immutable/assets/logo-pzn.DBHQYbA6.png";
            logo.setAttributeNode(src);
        </script>
    </body>
</html>
