<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Inner HTML</title>
    </head>
    <body>
        <div id="content">
        </div>
        <script>
            const content = document.getElementById("content");
            content.innerHTML = "<h1>This is Title</h1><p>This is Description</p>";
        </script>
        </script>
    </body>
</html>
