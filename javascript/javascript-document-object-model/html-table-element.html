<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>HTML Table Element</title>
    </head>
    <body>
        <table id="orderRevenue" border="1">
            <caption>Order Revenue</caption>
            <thead>
                <tr>
                    <th>Month</th>
                    <th>Income</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>January</td>
                    <td>10000000</td>
                </tr>
                <tr>
                    <td>February</td>
                    <td>20000000</td>
                </tr>
                <tr>
                    <td>March</td>
                    <td>30000000</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>Total</td>
                    <td>60000000</td>
                </tr>
            </tfoot>
        </table>
        <script>
            const orderRevenue = document.getElementById("orderRevenue");
            console.info(orderRevenue.caption);
            console.info(orderRevenue.tHead);
            console.info(orderRevenue.tBodies);
            console.info(orderRevenue.tFoot);
        </script>
    </body>
</html>
