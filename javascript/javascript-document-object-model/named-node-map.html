<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Named Node Map</title>
    </head>
    <body>
        <img id="logo" src="https://www.programmerzamannow.com/_app/immutable/assets/logo-pzn.DBHQYbA6.png" alt="PZN logo">
        <script>
            const logo = document.getElementById("logo");
            const attributes = logo.attributes;

            for (let attribute of attributes) {
                console.info(`${attribute.name} : ${attribute.value}`)
            }
        </script>
    </body>
</html>
