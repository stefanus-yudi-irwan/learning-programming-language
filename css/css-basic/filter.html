<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter</title>
    <style>
        img {
            width: 500px;
            filter: blur(5px);
        }

        p {
            filter: blur(2px);
        }
    </style>
</head>
<body>
    <img src="images/images.jpg">

    <p>Lorem Ipsum Dolor Sit Amer</p>
</body>
</html>
