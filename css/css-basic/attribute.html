<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <style>
        a[target="_blank"] {
            color: red;
        }
        .article[title*="belajar"] {
            color: red;
        }
    </style>
</head>
<body>
    <a href="" target="_blank">Contoh 1</a>
    <a href="">Contoh 2</a>
    <a href="" target="_blank">Contoh 3</a>
    <a href="">Contoh 4</a>
    <a href="" target="_self">Contoh 5</a>
    <p title="belajar pemrograman" class="article">Ini Dipilih</p>
    <p title="belajarpemrograman">Ini Dipilih</p>
    <p title="belajar-pemrograman">Ini Dipilih</p>
    <p title="pemrograman belajar">Ini Dipilih</p>
</body>
</html>
