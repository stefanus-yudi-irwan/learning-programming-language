<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flex Item</title>
        <style>
            .container {
                display: flex;
                flex-wrap: wrap;
            }
            .content {
                background-color: aqua;
                border: 2px solid blue;
                margin: 10px;
                padding: 10px;
                width: 200px;
            }
        </style>
    </head>
    <body>
        <div class="container">
           <div class="content" style="order: 2;">
                <h1>Ini Konten 1</h1>
                <p>Ini paragraph 1</p>
            </div>
            <div class="content" style="order: 3;">
                <h1>Ini Konten 2</h1>
                <p>Ini paragraph 2</p>
            </div>
            <div class="content" style="order: 1;">
                <h1>Ini Konten 3</h1>
                <p>Ini paragraph 3</p>
            </div>
        </div>
    </body>
</html>
