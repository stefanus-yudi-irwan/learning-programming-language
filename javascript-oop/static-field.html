<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Static Class Field</title>
    </head>
    <body>
        <script>

            class Configuration {

                static name = "Belajar Javascript OOP";
                static version = 1.0;
                static author = "Stefanus Yudi Irwan";

            }

            const config = new Configuration();
            console.info(config.name); // undefined static field belong not to instance

            Configuration.author = "Budi Dermawan";
            
            // How to access static field
            console.info(Configuration.name);
            console.info(Configuration.version);
            console.info(Configuration.author);

        </script>
    </body>
</html>
