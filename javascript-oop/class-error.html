<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Class Error</title>
    </head>
    <body>
        <script>

            class MathUtil {

                static sum(...numbers) {

                    if (numbers.length === 0) {
                        throw new Error("Total parameter harus lebih dari 0");
                    } 

                    let total = 0;
                    for (const number of numbers) {
                        total += number;
                    }
                    return total;
                }

            }

            const sum = MathUtil.sum(); // program execution stop here
            console.info(sum);

            const result = MathUtil.sum(1,1,1,1,1);
            console.info(result);

        </script>
    </body>
</html>
